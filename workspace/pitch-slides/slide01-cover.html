<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1A1A1A; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.logo-area {
  width: 120pt; height: 120pt; background: #2E7D32; border-radius: 60pt;
  display: flex; justify-content: center; align-items: center;
  margin-bottom: 24pt;
}
.logo-text { color: #ffffff; font-size: 48pt; font-weight: bold; }
h1 { color: #ffffff; font-size: 54pt; margin: 0 0 12pt 0; text-align: center; }
.tagline { color: #AAAAAA; font-size: 20pt; text-align: center; margin: 0 0 36pt 0; }
.deck-type { color: #2E7D32; font-size: 14pt; text-align: center; margin: 0; }
.accent-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 6pt;
  background: #2E7D32;
}
</style>
</head>
<body>
<div class="logo-area">
  <p class="logo-text">C</p>
</div>
<h1>CoNest</h1>
<p class="tagline">Safe, Verified Shared Housing for Single Parents</p>
<p class="deck-type">Investor Pitch Deck | Pre-Seed 2025</p>
<div class="accent-bar"></div>
</body>
</html>
