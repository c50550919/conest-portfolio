# SonarQube Configuration for SafeNest Backend

# Project Identification
sonar.projectKey=safenest-backend
sonar.projectName=SafeNest Backend API
sonar.projectVersion=1.0.0

# Source Code Location
sonar.sources=src
sonar.tests=__tests__
sonar.sourceEncoding=UTF-8

# TypeScript Configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=test-report.xml

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts,**/*.spec.ts
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/migrations/**,**/__tests__/**

# Quality Gates - Code Complexity
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

# Maximum cyclomatic complexity per function
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.ts

# Maximum cognitive complexity
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S3358
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.ts

# Maximum file lines
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S104
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.ts

# Maximum function parameters
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S107
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.ts

# Quality Gates Thresholds
sonar.qualitygate.wait=true

# Code Coverage Requirements
sonar.coverage.minimum=80.0
sonar.tests.coverage.minimum=80.0

# Security Hotspots
sonar.security.hotspots.minimumScore=A

# Code Smells
sonar.debt.threshold=5%

# Duplications
sonar.cpd.exclusions=**/__tests__/**

# Technical Debt
sonar.technicalDebt.hoursInDay=8
sonar.technicalDebt.ratingGrid=0.05,0.1,0.2,0.5

# Additional Rules
sonar.typescript.tslint.configPath=tslint.json
sonar.typescript.node=node
