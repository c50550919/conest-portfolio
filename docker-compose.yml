# Development Docker Compose Configuration
#
# For local development only — do not deploy.
#
# This file uses TWO separate env files:
#
#   1. Root `.env` (compose-interpolation plane)
#      Resolves ${VAR} references in this YAML. Required for Compose to parse
#      the file via `docker compose config`, `build`, `up`, or any command
#      that evaluates the compose spec.
#      Copy .env.example → .env and set: DB_USER, DB_PASSWORD, DB_NAME, REDIS_PASSWORD.
#
#   2. backend/.env (container runtime plane)
#      Loaded into the backend container via `env_file:`. Provides app secrets
#      like JWT_SECRET, Stripe keys, Veriff/Certn/Telnyx credentials.
#      Copy backend/.env.example → backend/.env and fill values.
#
# Precedence: `environment:` overrides `env_file:`. The compose-computed
# DATABASE_URL and REDIS_URL declared here always win for the backend container.
#
# Usage:
#   docker-compose up -d

version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: conest-postgres
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required (see .env)}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required (see .env)}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required (see .env)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DATABASE.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - conest-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: conest-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required (see .env)}
    ports:
      - "127.0.0.1:6380:6379"
    networks:
      - conest-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: conest-backend
    env_file:
      - ./backend/.env
    environment:
      # Compose-specific overrides (always set regardless of backend/.env)
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - conest-network
    command: npm run dev

  web:
    container_name: placd-web
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - conest-network

volumes:
  postgres_data:

networks:
  conest-network:
    driver: bridge
