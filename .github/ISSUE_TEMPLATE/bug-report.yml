name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["type:bug", "status:triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Please provide detailed information to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Impact of this bug
      options:
        - "Critical - App crash / Data loss / Security issue"
        - "High - Major feature broken"
        - "Medium - Feature partially broken"
        - "Low - Minor inconvenience"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Frontend - Mobile App (iOS)
        - Frontend - Mobile App (Android)
        - Backend - API
        - Backend - Database
        - Authentication
        - Messaging
        - Payments
        - Matching Algorithm
        - Infrastructure
        - Unknown
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: System and environment details
      placeholder: |
        - Device: iPhone 14 / Pixel 7 / Simulator
        - OS: iOS 17.1 / Android 14
        - App Version: 1.0.0
        - Backend Version: (if known)
        - Browser: (for web-based testing)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Include any error messages, stack traces, or logs
      render: shell
      placeholder: |
        Paste error messages or logs here...
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos
      description: Add screenshots or screen recordings if applicable
      placeholder: Drag and drop images here or paste URLs...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: |
        - Frequency of occurrence
        - Workarounds discovered
        - Related issues
    validations:
      required: false

  - type: checkboxes
    id: security-check
    attributes:
      label: Security Impact Check
      description: Does this bug have security implications?
      options:
        - label: This bug does NOT expose sensitive user data
          required: true
        - label: This bug does NOT involve child safety features
          required: true
