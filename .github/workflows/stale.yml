name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale Issues and PRs
    runs-on: ubuntu-latest

    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v8
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issue configuration
          stale-issue-message: |
            👋 This issue has been automatically marked as stale because it has not had recent activity.

            It will be closed in 14 days if no further activity occurs.

            If this issue is still relevant:
            - Add a comment with an update
            - Remove the `stale` label

            Thank you for your contributions to CoNest!

          stale-issue-label: 'stale'
          days-before-issue-stale: 30
          days-before-issue-close: 14

          # PR configuration
          stale-pr-message: |
            👋 This pull request has been automatically marked as stale because it has not had recent activity.

            It will be closed in 7 days if no further activity occurs.

            If this PR is still needed:
            - Rebase on latest `main`
            - Address any outstanding review comments
            - Remove the `stale` label

          stale-pr-label: 'stale'
          days-before-pr-stale: 14
          days-before-pr-close: 7

          # Labels that prevent stale marking
          exempt-issue-labels: |
            priority:high
            security
            blocked
            in-progress

          exempt-pr-labels: |
            priority:high
            security
            blocked
            work-in-progress

          # Don't close issues with these labels
          exempt-all-issue-assignees: true

          # Operations per run
          operations-per-run: 100

          # Message when closing
          close-issue-message: |
            🔒 This issue has been closed due to inactivity.

            If this issue is still relevant, please open a new issue with updated context and reference this one.

          close-pr-message: |
            🔒 This pull request has been closed due to inactivity.

            If you'd like to continue this work, please open a new PR with rebased changes.
