name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main, portfolio-main, 'security/**' ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main, portfolio-main ]
    paths:
      - 'backend/**'

jobs:
  surface-check:
    name: Surface Check (lint + type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check (informational)
        run: npx tsc --noEmit || true

      - name: Lint (informational)
        run: npx eslint src/ --ext .ts || true

      - name: Status
        run: echo "Surface check completed. See logs above for lint/type warnings. Integration and E2E tests run locally via 'npm test' against docker-compose services."
