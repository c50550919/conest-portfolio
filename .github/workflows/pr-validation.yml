name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main, develop]

permissions:
  pull-requests: write
  statuses: write

jobs:
  validate-pr-title:
    name: Validate PR Title (Conventional Commits)
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Configure valid types
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert

          # Configure valid scopes
          scopes: |
            backend
            mobile
            ios
            android
            db
            auth
            matching
            messaging
            payments
            infra
            deps
            api

          # Require scope
          requireScope: false

          # Allow WIP prefix for draft PRs
          wip: true

          # Custom error message
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            PR title must start with a capital letter.
            Example: "feat(backend): Add user profile API"

  validate-pr-body:
    name: Validate PR Description
    runs-on: ubuntu-latest

    steps:
      - name: Check PR has description
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            const issues = [];

            // Check for linked issue
            const hasIssueRef = /closes?\s+#\d+|fixes?\s+#\d+|resolves?\s+#\d+/i.test(body);
            if (!hasIssueRef && !pr.draft) {
              issues.push('⚠️ PR should reference an issue (e.g., "Closes #123")');
            }

            // Check for empty description
            if (body.trim().length < 50) {
              issues.push('⚠️ PR description is too short. Please describe your changes.');
            }

            // Check for unchecked required items
            const securityChecks = body.match(/- \[ \].*(?:security|sensitive|child)/gi) || [];
            if (securityChecks.length > 0) {
              issues.push('🔒 Please complete the security checklist items');
            }

            if (issues.length > 0 && !pr.draft) {
              const comment = `## PR Validation Issues\n\n${issues.join('\n')}\n\nPlease update your PR to address these items.`;

              // Check if we already commented
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });

              const botComment = comments.data.find(c =>
                c.user.type === 'Bot' && c.body.includes('PR Validation Issues')
              );

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: comment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: comment
                });
              }

              // Don't fail for warnings, just inform
              console.log('Validation warnings posted to PR');
            }

  check-branch-name:
    name: Validate Branch Name
    runs-on: ubuntu-latest

    steps:
      - name: Check branch naming convention
        uses: actions/github-script@v6
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const validPatterns = [
              /^feature\/\d+-[\w-]+$/,
              /^bugfix\/\d+-[\w-]+$/,
              /^hotfix\/\d+-[\w-]+$/,
              /^tech\/\d+-[\w-]+$/,
              /^spike\/\d+-[\w-]+$/,
              /^dependabot\//,
              /^renovate\//,
              /^\d+-[\w-]+$/  // Allow issue-number prefix branches
            ];

            const isValid = validPatterns.some(pattern => pattern.test(branch));

            if (!isValid) {
              console.log(`⚠️ Branch name "${branch}" doesn't follow naming convention`);
              console.log('Expected patterns:');
              console.log('  - feature/123-description');
              console.log('  - bugfix/123-description');
              console.log('  - hotfix/123-description');
              console.log('  - tech/123-description');
              console.log('  - spike/123-description');
              // Warning only, don't fail the check
            } else {
              console.log(`✅ Branch name "${branch}" follows convention`);
            }

  size-label:
    name: Add Size Label
    runs-on: ubuntu-latest

    steps:
      - name: Label PR by size
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const changes = additions + deletions;

            let sizeLabel;
            if (changes < 10) {
              sizeLabel = 'size:XS';
            } else if (changes < 50) {
              sizeLabel = 'size:S';
            } else if (changes < 200) {
              sizeLabel = 'size:M';
            } else if (changes < 500) {
              sizeLabel = 'size:L';
            } else {
              sizeLabel = 'size:XL';
            }

            // Remove existing size labels
            const currentLabels = pr.labels.map(l => l.name);
            const sizeLabels = currentLabels.filter(l => l.startsWith('size:'));

            for (const label of sizeLabels) {
              if (label !== sizeLabel) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: label
                }).catch(() => {}); // Ignore if label doesn't exist
              }
            }

            // Add new size label
            if (!currentLabels.includes(sizeLabel)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [sizeLabel]
              });
            }

            console.log(`PR has ${changes} changes (${additions}+ / ${deletions}-) → ${sizeLabel}`);
