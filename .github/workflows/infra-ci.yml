name: Infrastructure CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/infra/terraform/**'
      - 'backend/infra/policy/**'
      - '.github/workflows/infra-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/infra/terraform/**'
      - 'backend/infra/policy/**'

env:
  TF_VERSION: '1.6.0'

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive
        continue-on-error: true
      - run: terraform init -backend=false
      - run: terraform validate

  security-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@master
        with:
          directory: backend/infra/terraform
          framework: terraform
          soft_fail: true
      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: backend/infra/terraform
          soft_fail: true

  policy-check:
    name: Policy Check (OPA)
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: backend/infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - run: terraform init -backend=false
      - name: Generate Plan JSON
        run: |
          terraform plan -var-file=environments/dev.tfvars -out=tfplan.binary -input=false || true
          terraform show -json tfplan.binary > tfplan.json || echo '{}' > tfplan.json
        env:
          TF_VAR_db_password: "dummy-password-for-ci"
      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.46.0/conftest_0.46.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.46.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
      - name: Validate Plan Output
        id: validate-plan
        run: |
          if [ ! -s tfplan.json ] || [ "$(cat tfplan.json)" = "{}" ]; then
            echo "::warning::Terraform plan produced no output (likely missing AWS credentials). Skipping policy checks."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Run Policy Checks
        if: steps.validate-plan.outputs.skip != 'true'
        run: conftest test tfplan.json -p ../policy/ --all-namespaces
